<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Intercom — Radio Monaco</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0D1016;color:#E8EAF0;font-family:'Barlow',sans-serif;overflow:hidden;}
.hdr{background:#C4001A;height:64px;display:flex;align-items:center;padding:0 20px;gap:14px;}
.hdr-logo{width:40px;height:40px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#C4001A;}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#fff;flex:1;}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:#555;transition:background .3s;}
.hdr-dot.online{background:#27AE60;box-shadow:0 0 8px #27AE60;}
.hdr-dot.wait{background:#F5C518;animation:blink .6s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#hdr-status{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.6);letter-spacing:1px;margin-left:4px;}
.main{height:calc(100vh - 64px);overflow-y:auto;padding:20px 16px 40px;display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto;}
.card{background:#181B26;border:1px solid #232730;border-radius:14px;padding:18px;}
.lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#5E6474;margin-bottom:6px;}
.inp{width:100%;height:48px;background:#0D1016;border:1px solid #232730;border-radius:8px;color:#E8EAF0;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 14px;outline:none;-webkit-appearance:none;}
.inp:focus{border-color:#5E6474;}
.inp.code{color:#F5C518;font-size:22px;letter-spacing:.2em;}
.row{display:flex;gap:8px;}
.btn{height:48px;border-radius:8px;border:1px solid;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;padding:0 20px;transition:all .15s;-webkit-appearance:none;background:transparent;}
.btn-red{border-color:#E4032E;color:#E4032E;flex:1;}
.btn-red:hover{background:rgba(228,3,46,.15);}
.btn-green{border-color:#27AE60;color:#27AE60;}
.btn-green:hover{background:rgba(39,174,96,.12);}
.btn-muted{border-color:#232730;color:#5E6474;width:100%;}
.btn-muted:hover{border-color:#5E6474;color:#E8EAF0;}
.divider{display:flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;color:#5E6474;text-transform:uppercase;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#232730;}
.room-box{background:#0D1016;border:1px solid #232730;border-radius:10px;padding:16px;text-align:center;}
.room-code{font-family:'Share Tech Mono',monospace;font-size:36px;color:#F5C518;letter-spacing:.2em;display:block;margin-bottom:6px;}
.room-hint{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#5E6474;letter-spacing:.1em;text-transform:uppercase;}
.copy-btn{margin-top:10px;background:transparent;border:1px solid #232730;color:#5E6474;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:6px 16px;border-radius:6px;cursor:pointer;}
.copy-btn:hover{border-color:#F5C518;color:#F5C518;}
.participants{display:flex;align-items:center;justify-content:space-between;background:#0D1016;border:1px solid #232730;border-radius:10px;padding:12px 16px;}
.p-count{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;}
.p-tags{display:flex;gap:6px;}
.p-tag{background:#12151C;border:1px solid #232730;border-radius:6px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:5px;}
.p-tag-dot{width:6px;height:6px;border-radius:50%;}
.peer-row{display:flex;align-items:center;gap:14px;background:#0D1016;border:1px solid #232730;border-radius:10px;padding:14px;}
.avatar{width:48px;height:48px;border-radius:50%;background:rgba(228,3,46,.15);border:2px solid #E4032E;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#E4032E;flex-shrink:0;transition:all .2s;}
.avatar.speaking{border-color:#27AE60;color:#27AE60;background:rgba(39,174,96,.15);box-shadow:0 0 16px rgba(39,174,96,.3);}
.peer-name-txt{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;}
.peer-state-txt{font-family:'Share Tech Mono',monospace;font-size:10px;color:#5E6474;letter-spacing:1px;margin-top:2px;}
.peer-state-txt.speaking{color:#27AE60;}
.ptt-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0;}
.ptt{width:160px;height:160px;border-radius:50%;background:rgba(228,3,46,.1);border:3px solid #E4032E;color:#E4032E;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all .1s;-webkit-user-select:none;user-select:none;touch-action:none;}
.ptt.on{background:#E4032E;color:#fff;box-shadow:0 0 0 20px rgba(228,3,46,.1),0 0 40px rgba(228,3,46,.3);transform:scale(.96);}
.ptt-ico{font-size:48px;line-height:1;pointer-events:none;}
.ptt-lbl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;pointer-events:none;}
.ptt-hint{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5E6474;}
.connected-card{transition:background .2s,border-color .2s,box-shadow .2s;}
.connected-card.rx{background:rgba(228,3,46,.06);border-color:#E4032E;box-shadow:0 0 0 2px rgba(228,3,46,.12);}
.connected-card.tx{background:rgba(39,174,96,.06);border-color:#27AE60;box-shadow:0 0 0 2px rgba(39,174,96,.12);}
.vu{display:flex;gap:2px;align-items:flex-end;}
.vu-b{flex:1;background:#232730;border-radius:2px;min-height:3px;transition:height .05s,background .05s;}
.log-card{background:#181B26;border:1px solid #232730;border-radius:14px;overflow:hidden;max-height:160px;display:flex;flex-direction:column;}
.log-hdr{padding:8px 14px;background:#12151C;border-bottom:1px solid #232730;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#5E6474;}
.log-body{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:3px;}
.log-entry{font-family:'Share Tech Mono',monospace;font-size:10px;color:#5E6474;display:flex;gap:8px;}
.log-entry.ok{color:rgba(39,174,96,.8);}
.log-entry.err{color:rgba(228,3,46,.8);}
.log-t{color:#42465A;flex-shrink:0;}
#section-setup{display:flex;flex-direction:column;gap:14px;}
#section-connected{display:none;flex-direction:column;gap:14px;}
.chat-card{background:#181B26;border:1px solid #232730;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;max-height:280px;}
.chat-hdr{padding:10px 16px;background:#12151C;border-bottom:1px solid #232730;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#5E6474;display:flex;align-items:center;justify-content:space-between;}
.chat-badge{background:#E4032E;color:#fff;font-family:'Share Tech Mono',monospace;font-size:9px;padding:1px 6px;border-radius:10px;display:none;}
.chat-messages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.chat-msg{display:flex;flex-direction:column;gap:2px;max-width:85%;}
.chat-msg.me{align-self:flex-end;align-items:flex-end;}
.chat-msg.them{align-self:flex-start;align-items:flex-start;}
.chat-bubble{padding:8px 12px;border-radius:10px;font-family:'Barlow',sans-serif;font-size:13px;line-height:1.4;word-break:break-word;}
.chat-msg.me .chat-bubble{background:#E4032E;color:#fff;border-radius:10px 10px 2px 10px;}
.chat-msg.them .chat-bubble{background:#252A38;color:#E8EAF0;border-radius:10px 10px 10px 2px;}
.chat-meta{font-family:'Share Tech Mono',monospace;font-size:9px;color:#42465A;letter-spacing:.5px;}
.chat-input-row{display:flex;gap:0;border-top:1px solid #232730;}
.chat-input{flex:1;height:44px;background:#0D1016;border:none;color:#E8EAF0;font-family:'Barlow',sans-serif;font-size:13px;padding:0 14px;outline:none;}
.chat-input::placeholder{color:#42465A;}
.chat-send{width:52px;height:44px;background:transparent;border:none;border-left:1px solid #232730;color:#5E6474;cursor:pointer;font-size:18px;transition:color .15s,background .15s;}
.chat-send:hover{color:#E4032E;background:rgba(228,3,46,.08);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">M</div>
  <div class="hdr-title">Intercom</div>
  <div class="hdr-dot" id="hdr-dot"></div>
  <span id="hdr-status">HORS LIGNE</span>
</div>
<div class="main">
  <div id="section-setup">
    <div class="card">
      <div class="lbl">Votre nom</div>
      <input class="inp" id="my-name" type="text" placeholder="STUDIO, RÉGIE…" maxlength="16" autocomplete="off">
    </div>
    <button class="btn btn-red" style="width:100%;height:52px;" onclick="createRoom()">+ Créer une room</button>
    <div class="divider">ou rejoindre</div>
    <div class="card">
      <div class="lbl">Code de la room</div>
      <div class="row">
        <input class="inp code" id="room-input" type="text" placeholder="ABC123" maxlength="8" autocomplete="off" autocapitalize="characters" onkeydown="if(event.key==='Enter')joinRoom()">
        <button class="btn btn-green" onclick="joinRoom()">Rejoindre</button>
      </div>
    </div>
    <div id="room-created" style="display:none;">
      <div class="room-box">
        <span class="room-code" id="room-code-display">---</span>
        <span class="room-hint">Partagez ce code</span><br>
        <button class="copy-btn" onclick="copyCode()">Copier</button>
      </div>
      <p style="text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#5E6474;letter-spacing:.1em;text-transform:uppercase;margin-top:10px;">En attente de connexion…</p>
    </div>
    <div class="log-card"><div class="log-hdr">Journal</div><div class="log-body" id="log-a"></div></div>
  </div>

  <div id="section-connected">
    <div class="card connected-card" id="conn-card" style="display:flex;flex-direction:column;gap:14px;">
      <div class="participants">
        <div class="p-count" id="p-count">2 participants</div>
        <div class="p-tags" id="p-tags"></div>
      </div>
      <div class="peer-row">
        <div class="avatar" id="peer-avatar">?</div>
        <div>
          <div class="peer-name-txt" id="peer-name">—</div>
          <div class="peer-state-txt" id="peer-state">CONNECTÉ</div>
        </div>
        <div class="vu" id="vu-remote" style="margin-left:auto;width:60px;height:28px;"></div>
      </div>
      <div class="ptt-wrap">
        <div class="ptt" id="ptt"
          ontouchstart="pttOn(event)" ontouchend="pttOff(event)" ontouchcancel="pttOff(event)"
          onmousedown="pttOn(event)" onmouseup="pttOff(event)" onmouseleave="pttOff(event)">
          <div class="ptt-ico">🎙️</div>
          <div class="ptt-lbl">Push to Talk</div>
        </div>
        <div class="ptt-hint" id="ptt-hint">Maintenez pour parler</div>
      </div>
      <div style="background:#0D1016;border:1px solid #232730;border-radius:8px;padding:10px 14px;">
        <div class="lbl" style="margin-bottom:6px;">Votre micro</div>
        <div class="vu" id="vu-local" style="width:100%;height:32px;"></div>
      </div>
    </div>
    <button class="btn btn-muted" onclick="hangUp()">■ Raccrocher</button>
    <div class="log-card"><div class="log-hdr">Journal</div><div class="log-body" id="log-b"></div></div>

    <!-- Chat -->
    <div class="chat-card" id="chat-card">
      <div class="chat-hdr">
        <span>Messages</span>
        <span class="chat-badge" id="chat-badge">!</span>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" type="text" placeholder="Écrire un message…" maxlength="300"
          onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">&#10148;</button>
      </div>
    </div>

  </div>
</div>
<audio id="remote-audio" autoplay playsinline style="display:none;"></audio>
<script>
var TURN_URL='https://intercom-turn.nicolas7lejeune.workers.dev/';
var peer=null,conn=null,call=null,localStream=null;
var myName='',peerName='',isHost=false,pttActive=false;
var audioCtx=null,localAnalyser=null,remoteAnalyser=null,vuRaf=null;

function beep(freq,dur,vol){
  try{
    var ctx=getACtx();
    var o=ctx.createOscillator();
    var g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq||880;
    g.gain.setValueAtTime(vol||0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+(dur||0.15));
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime+(dur||0.15));
  }catch(e){}
}
function bipConnect(){
  // Deux bips montants : connexion
  beep(660,0.1,0.25);
  setTimeout(function(){beep(880,0.12,0.3);},120);
}
function bipDisconnect(){
  // Deux bips descendants : déconnexion
  beep(880,0.1,0.2);
  setTimeout(function(){beep(560,0.12,0.2);},120);
}

function log(msg,type){
  var id=document.getElementById('section-connected').style.display!=='none'?'log-b':'log-a';
  var el=document.getElementById(id);if(!el)return;
  var t=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var d=document.createElement('div');
  d.className='log-entry'+(type?' '+type:'');
  d.innerHTML='<span class="log-t">'+t+'</span><span>'+msg+'</span>';
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function setStatus(txt,state){
  document.getElementById('hdr-dot').className='hdr-dot'+(state?' '+state:'');
  document.getElementById('hdr-status').textContent=txt;
}
async function getPeerConfig(){
  try{
    var r=await fetch(TURN_URL,{signal:AbortSignal.timeout(6000)});
    var d=await r.json();
    // Cloudflare renvoie { iceServers: { urls: "...", username: "...", credential: "..." } }
    // C'est un OBJET unique, pas un tableau — on le convertit
    var raw=d.iceServers;
    var ice=[];
    if(raw){
      // Si c'est un tableau, on l'utilise tel quel
      var arr=Array.isArray(raw)?raw:[raw];
      arr.forEach(function(s){
        // urls peut être une string avec des virgules ou un tableau
        var urls=s.urls;
        if(typeof urls==='string') urls=urls.split(',').map(function(u){return u.trim();});
        if(!Array.isArray(urls)) urls=[urls];
        var entry={urls:urls};
        if(s.username)entry.username=s.username;
        if(s.credential)entry.credential=s.credential;
        ice.push(entry);
      });
    }
    if(ice.length>0){
      log('TURN Cloudflare OK — '+ice.length+' entrée(s)','ok');
      return{host:'0.peerjs.com',port:443,secure:true,config:{iceTransportPolicy:'all',iceServers:ice}};
    }
    log('TURN: réponse vide','err');
  }catch(e){log('TURN erreur: '+e.message,'err');}
  log('Fallback STUN','err');
  return{host:'0.peerjs.com',port:443,secure:true,config:{iceServers:[
    {urls:['stun:stun.l.google.com:19302']},
    {urls:['stun:stun1.l.google.com:19302']}
  ]}};
}
async function initPeer(peerId){
  setStatus('CONNEXION…','wait');
  var cfg=await getPeerConfig();
  peer=new Peer(peerId,cfg);
  peer.on('open',function(id){log('Connecté ID:'+id,'ok');setStatus('EN LIGNE','online');});
  peer.on('connection',function(c){log('Connexion entrante','ok');conn=c;bindConn(c);});
  peer.on('call',function(c){
    log('Appel audio entrant','ok');call=c;
    getMic(function(s){c.answer(s);bindCall(c);});
  });
  peer.on('error',function(e){log('Erreur: '+e.type,'err');setStatus('ERREUR','');});
  peer.on('disconnected',function(){log('Déconnecté','err');setStatus('DÉCONNECTÉ','');});
}
function genCode(){
  var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',r='';
  for(var i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r;
}
window.createRoom=async function(){
  myName=(document.getElementById('my-name').value.trim()||'STUDIO').toUpperCase();
  isHost=true;
  var code=genCode();
  await initPeer('rm-'+code);
  document.getElementById('room-created').style.display='block';
  document.getElementById('room-code-display').textContent=code;
  log('Room créée: '+code,'ok');
  getMic(function(){log('Micro hôte prêt','ok');});
};
window.joinRoom=async function(){
  var code=document.getElementById('room-input').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(code.length<4){log('Code invalide','err');return;}
  myName=(document.getElementById('my-name').value.trim()||'RÉGIE').toUpperCase();
  isHost=false;
  await initPeer('cl-'+Date.now());
  peer.on('open',function(){
    log('Connexion à '+code+'…');
    conn=peer.connect('rm-'+code,{reliable:true});
    bindConn(conn);
  });
};
function bindConn(c){
  c.on('open',function(){
    log('Canal ouvert','ok');
    c.send({type:'hello',name:myName});
    if(!isHost){
      getMic(function(s){
        log('Appel audio…','ok');
        call=peer.call(c.peer,s);
        bindCall(call);
      });
    }
    showConnected();
  });
  c.on('data',function(d){
    if(d.type==='hello'){peerName=d.name;updatePeerUI();log(peerName+' connecté','ok');renderParticipants();bipConnect();}
    if(d.type==='ptt_on')setPeerSpeaking(true);
    if(d.type==='ptt_off')setPeerSpeaking(false);
    if(d.type==='chat')addChatMsg(d.text, d.name||peerName, false);
  });
  c.on('close',function(){log('Connexion fermée','err');bipDisconnect();doHangUp();});
  c.on('error',function(e){log('Erreur data: '+e,'err');});
}
function bindCall(c){
  c.on('stream',function(remote){
    log('Audio reçu','ok');
    var a=document.getElementById('remote-audio');
    a.srcObject=remote;
    a.play().catch(function(){
      log('Tapez l\'écran pour activer l\'audio','err');
      ['click','touchstart'].forEach(function(ev){document.addEventListener(ev,function u(){a.play();document.removeEventListener(ev,u);},{once:true});});
    });
    setupRemoteVU(remote);
  });
  c.on('error',function(e){log('Erreur appel: '+e,'err');});
}
function getMic(cb){
  if(localStream){cb(localStream);return;}
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true},video:false})
    .then(function(s){localStream=s;muteAll(true);setupLocalVU(s);cb(s);})
    .catch(function(e){log('Micro refusé: '+e.message,'err');});
}
function muteAll(m){if(localStream)localStream.getAudioTracks().forEach(function(t){t.enabled=!m;});}
window.pttOn=function(e){
  e.preventDefault();if(!conn||pttActive)return;
  pttActive=true;muteAll(false);
  document.getElementById('ptt').classList.add('on');
  document.getElementById('ptt-hint').textContent='En diffusion…';
  document.getElementById('ptt-hint').style.color='#27AE60';
  document.getElementById('conn-card').className='card connected-card tx';
  if(conn.open)conn.send({type:'ptt_on'});
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
};
window.pttOff=function(e){
  if(!pttActive)return;pttActive=false;muteAll(true);
  document.getElementById('ptt').classList.remove('on');
  document.getElementById('ptt-hint').textContent='Maintenez pour parler';
  document.getElementById('ptt-hint').style.color='';
  document.getElementById('conn-card').className='card connected-card';
  if(conn&&conn.open)conn.send({type:'ptt_off'});
};
function setPeerSpeaking(on){
  document.getElementById('peer-avatar').className='avatar'+(on?' speaking':'');
  var s=document.getElementById('peer-state');
  s.textContent=on?'PARLE…':'CONNECTÉ';s.className='peer-state-txt'+(on?' speaking':'');
  document.getElementById('conn-card').className='card connected-card'+(on?' rx':'');
}
var N=14;
function makeVU(id){var c=document.getElementById(id);if(!c)return;c.innerHTML='';for(var i=0;i<N;i++){var b=document.createElement('div');b.className='vu-b';c.appendChild(b);}}
function getACtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function setupLocalVU(s){var ctx=getACtx();localAnalyser=ctx.createAnalyser();localAnalyser.fftSize=256;localAnalyser.smoothingTimeConstant=.7;ctx.createMediaStreamSource(s).connect(localAnalyser);makeVU('vu-local');if(!vuRaf)vuLoop();}
function setupRemoteVU(s){var ctx=getACtx();remoteAnalyser=ctx.createAnalyser();remoteAnalyser.fftSize=256;remoteAnalyser.smoothingTimeConstant=.7;ctx.createMediaStreamSource(s).connect(remoteAnalyser);makeVU('vu-remote');}
function vuLoop(){vuRaf=requestAnimationFrame(vuLoop);paintVU('vu-local',localAnalyser,pttActive);paintVU('vu-remote',remoteAnalyser,false);}
function paintVU(id,an,active){
  if(!an)return;var c=document.getElementById(id);if(!c)return;
  var bars=c.querySelectorAll('.vu-b');if(!bars.length)return;
  var d=new Uint8Array(an.frequencyBinCount);an.getByteFrequencyData(d);
  var avg=0;for(var i=0;i<d.length;i++)avg+=d[i];avg=avg/d.length/128;
  var act=Math.round(avg*N);
  bars.forEach(function(b,i){b.style.height=Math.max(8,i<act?40+i*3:8)+'%';b.style.background=active?(i<act*.6?'#27AE60':i<act*.85?'#F5C518':'#E4032E'):(i<act?'rgba(255,255,255,.25)':'#232730');});
}
function showConnected(){
  document.getElementById('section-setup').style.display='none';
  document.getElementById('section-connected').style.display='flex';
  updatePeerUI();renderParticipants();setStatus('CONNECTÉ','online');
}
function updatePeerUI(){
  var n=peerName||'…';
  document.getElementById('peer-name').textContent=n;
  document.getElementById('peer-avatar').textContent=n.charAt(0);
  if(peerName)setStatus('CONNECTÉ — '+peerName,'online');
}
function renderParticipants(){
  var tags=document.getElementById('p-tags');if(!tags)return;
  tags.innerHTML=[{name:myName,self:true},{name:peerName||'…',self:false}].map(function(p){
    return '<div class="p-tag"><div class="p-tag-dot" style="background:'+(p.self?'#27AE60':'#5E6474')+'"></div><span style="color:'+(p.self?'#E8EAF0':'#5E6474')+'">'+p.name+(p.self?' (vous)':'')+'</span></div>';
  }).join('');
}
window.copyCode=function(){
  navigator.clipboard.writeText(document.getElementById('room-code-display').textContent)
    .then(function(){var b=document.querySelector('.copy-btn');if(b){var t=b.textContent;b.textContent='✓ Copié !';setTimeout(function(){b.textContent=t;},2000);}});
};
// ── Chat ─────────────────────────────────────────────────────────────────
function addChatMsg(text, from, isMe) {
  var box = document.getElementById('chat-messages');
  if (!box) return;
  var t = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  var div = document.createElement('div');
  div.className = 'chat-msg ' + (isMe ? 'me' : 'them');
  div.innerHTML = '<div class="chat-bubble">'+escHtml(text)+'</div>'
    +'<div class="chat-meta">'+(isMe?'Vous':from)+' · '+t+'</div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  // Bip discret si message reçu
  if (!isMe) beep(1200, 0.08, 0.15);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.sendChat = function() {
  var inp = document.getElementById('chat-input');
  if (!inp) return;
  var txt = inp.value.trim();
  if (!txt || !conn || !conn.open) return;
  conn.send({type:'chat', text:txt, name:myName});
  addChatMsg(txt, myName, true);
  inp.value = '';
};

window.hangUp=function(){doHangUp();};
function doHangUp(){
  pttOff();
  if(vuRaf){cancelAnimationFrame(vuRaf);vuRaf=null;}
  if(call){try{call.close();}catch(e){}call=null;}
  if(conn){try{conn.close();}catch(e){}conn=null;}
  if(localStream){localStream.getTracks().forEach(function(t){t.stop();});localStream=null;}
  if(peer){try{peer.destroy();}catch(e){}peer=null;}
  localAnalyser=null;remoteAnalyser=null;peerName='';isHost=false;
  document.getElementById('section-setup').style.display='flex';
  document.getElementById('section-connected').style.display='none';
  document.getElementById('room-created').style.display='none';
  document.getElementById('room-input').value='';
  setStatus('HORS LIGNE','');log('Déconnecté');
}
log('Prêt');
</script>
