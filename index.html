<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Intercom — Radio Monaco</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0D1016;color:#E8EAF0;font-family:'Barlow',sans-serif;overflow:hidden;}
.hdr{background:#C4001A;height:56px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;}
.hdr-logo{width:36px;height:36px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#C4001A;flex-shrink:0;}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#fff;flex:1;}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;}
.hdr-dot.online{background:#27AE60;box-shadow:0 0 8px #27AE60;}
.hdr-dot.wait{background:#F5C518;animation:blink .6s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#hdr-st{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,.6);letter-spacing:1px;}
.page{height:calc(100vh - 56px);display:flex;flex-direction:column;}
.main{flex:1;overflow-y:auto;padding:14px 14px 100px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;}
.card{background:#181B26;border:1px solid #232730;border-radius:12px;padding:16px;}
.lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#5E6474;margin-bottom:6px;}
.inp{width:100%;height:48px;background:#0D1016;border:1px solid #232730;border-radius:8px;color:#E8EAF0;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 14px;outline:none;-webkit-appearance:none;}
.inp:focus{border-color:#5E6474;}
.inp.code{color:#F5C518;letter-spacing:.25em;}
.row{display:flex;gap:8px;}
.btn{height:48px;border-radius:8px;border:1px solid;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;padding:0 18px;-webkit-appearance:none;background:transparent;transition:all .15s;}
.btn-red{border-color:#E4032E;color:#E4032E;flex:1;}
.btn-red:active{background:rgba(228,3,46,.2);}
.btn-green{border-color:#27AE60;color:#27AE60;}
.btn-green:active{background:rgba(39,174,96,.15);}
.btn-gray{border-color:#232730;color:#5E6474;width:100%;}
.divider{display:flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;color:#5E6474;text-transform:uppercase;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#232730;}

/* Room code */
.room-box{background:#0D1016;border:2px solid #F5C518;border-radius:12px;padding:20px;text-align:center;cursor:pointer;}
.room-box:active{background:#0a0d08;}
.room-code-big{font-family:'Share Tech Mono',monospace;font-size:42px;color:#F5C518;letter-spacing:.25em;display:block;margin-bottom:6px;}
.room-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#5E6474;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;}
.room-copy-hint{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#42465A;letter-spacing:.1em;text-transform:uppercase;margin-top:8px;}
.copied-flash{color:#27AE60!important;}

/* Participants */
.p-grid{display:flex;flex-direction:column;gap:6px;}
.p-item{background:#0D1016;border:1px solid #232730;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;transition:all .2s;}
.p-item.speaking{border-color:#27AE60;background:rgba(39,174,96,.05);}
.p-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;flex-shrink:0;transition:all .2s;border:2px solid;}
.p-avatar.self{border-color:#60A5FA;color:#60A5FA;background:rgba(96,165,250,.1);}
.p-avatar.peer{border-color:#E4032E;color:#E4032E;background:rgba(228,3,46,.1);}
.p-avatar.speaking{border-color:#27AE60!important;color:#27AE60!important;background:rgba(39,174,96,.15)!important;box-shadow:0 0 10px rgba(39,174,96,.3);}
.p-info{flex:1;min-width:0;}
.p-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.p-name.self{color:#60A5FA;}
.p-tags{display:flex;gap:4px;margin-top:2px;}
.tag{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:1px 5px;border-radius:3px;}
.tag-host{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);color:#F5C518;}
.tag-muted{background:rgba(228,3,46,.1);border:1px solid rgba(228,3,46,.3);color:#E4032E;}
.mute-btn{background:transparent;border:1px solid #232730;color:#5E6474;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:all .15s;}
.mute-btn:active{border-color:#E4032E;color:#E4032E;}
.mute-btn.on{border-color:rgba(228,3,46,.5);color:#E4032E;background:rgba(228,3,46,.08);}

/* PTT */
.ptt-section{display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 0;}
.ptt{width:140px;height:140px;border-radius:50%;border:3px solid #E4032E;color:#E4032E;background:rgba(228,3,46,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;-webkit-user-select:none;user-select:none;touch-action:none;transition:all .1s;}
.ptt.on{background:#E4032E;color:#fff;box-shadow:0 0 0 16px rgba(228,3,46,.1),0 0 32px rgba(228,3,46,.25);transform:scale(.96);}
.ptt.blocked{border-color:#42465A;color:#42465A;background:transparent;opacity:.5;cursor:not-allowed;}
.ptt-ico{font-size:40px;line-height:1;pointer-events:none;}
.ptt-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;pointer-events:none;}
.ptt-hint{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#5E6474;text-align:center;}

/* Channel mute */
.ch-btn{width:100%;height:44px;background:transparent;border:1px solid #232730;border-radius:8px;color:#5E6474;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.ch-btn.muted{border-color:#E4032E;color:#E4032E;background:rgba(228,3,46,.06);}

/* Mute banner */
#mute-banner{display:none;position:fixed;inset:0;background:rgba(13,16,22,.95);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#mute-banner.show{display:flex;}
.mute-banner-txt{font-family:'Barlow Condensed',sans-serif;font-size:56px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#E4032E;text-align:center;line-height:1.1;}
.mute-banner-sub{font-family:'Share Tech Mono',monospace;font-size:11px;color:#5E6474;letter-spacing:2px;}
.mute-banner-btn{margin-top:8px;background:rgba(228,3,46,.12);border:1px solid #E4032E;color:#E4032E;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;padding:12px 32px;border-radius:8px;cursor:pointer;}

/* Chat */
.chat-panel{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#181B26;border-top:1px solid #232730;flex-direction:column;display:none;}
.chat-tab{height:40px;background:#12151C;display:flex;align-items:center;padding:0 16px;gap:8px;cursor:pointer;flex-shrink:0;}
.chat-tab-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#5E6474;flex:1;}
.chat-unread{background:#E4032E;color:#fff;font-family:'Share Tech Mono',monospace;font-size:9px;padding:1px 6px;border-radius:10px;display:none;}
.chat-msgs{overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;height:0;transition:height .2s;}
.chat-msgs.open{height:180px;}
.chat-msg{display:flex;flex-direction:column;gap:2px;max-width:85%;}
.chat-msg.me{align-self:flex-end;align-items:flex-end;}
.chat-msg.them{align-self:flex-start;}
.bubble{padding:8px 12px;border-radius:10px;font-family:'Barlow',sans-serif;font-size:14px;line-height:1.4;word-break:break-word;}
.me .bubble{background:#E4032E;color:#fff;border-radius:10px 10px 2px 10px;}
.them .bubble{background:#252A38;color:#E8EAF0;border-radius:10px 10px 10px 2px;}
.chat-meta{font-family:'Share Tech Mono',monospace;font-size:9px;color:#42465A;}
.chat-row{display:flex;border-top:1px solid #232730;flex-shrink:0;}
.chat-inp{flex:1;height:50px;background:#0D1016;border:none;color:#E8EAF0;font-family:'Barlow',sans-serif;font-size:16px;padding:0 14px;outline:none;-webkit-appearance:none;}
.chat-inp::placeholder{color:#42465A;}
.chat-send{width:56px;height:50px;background:transparent;border:none;border-left:1px solid #232730;color:#5E6474;font-size:20px;cursor:pointer;}
.chat-send:active{color:#E4032E;}

.log-card{background:#181B26;border:1px solid #232730;border-radius:12px;overflow:hidden;max-height:100px;display:flex;flex-direction:column;}
.log-hdr{padding:6px 14px;background:#12151C;border-bottom:1px solid #232730;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#5E6474;}
.log-body{overflow-y:auto;padding:5px 12px;display:flex;flex-direction:column;gap:2px;}
.le{font-family:'Share Tech Mono',monospace;font-size:9px;color:#5E6474;display:flex;gap:6px;}
.le.ok{color:rgba(39,174,96,.8);}
.le.err{color:rgba(228,3,46,.8);}
.lt{color:#42465A;flex-shrink:0;}

#sec-setup{display:flex;flex-direction:column;gap:12px;}
#sec-conn{display:none;flex-direction:column;gap:12px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">M</div>
  <div class="hdr-title">Intercom</div>
  <div class="hdr-dot" id="hdr-dot"></div>
  <span id="hdr-st">HORS LIGNE</span>
</div>

<div class="page">
<div class="main">

  <!-- SETUP -->
  <div id="sec-setup">
    <div class="card">
      <div class="lbl">Votre nom</div>
      <input class="inp" id="my-name" type="text" placeholder="STUDIO, RÉGIE…" maxlength="16" autocomplete="off">
    </div>
    <button class="btn btn-red" style="width:100%;height:52px;" onclick="createRoom()">+ Créer une room</button>
    <div class="divider">ou rejoindre</div>
    <div class="card">
      <div class="lbl">Code de la room</div>
      <div class="row">
        <input class="inp code" id="room-inp" type="text" placeholder="ABC123" maxlength="8" autocomplete="off" autocapitalize="characters" onkeydown="if(event.key==='Enter')joinRoom()">
        <button class="btn btn-green" onclick="joinRoom()">OK</button>
      </div>
    </div>
    <div class="log-card"><div class="log-hdr">Journal</div><div class="log-body" id="log-a"></div></div>
  </div>

  <!-- CONNECTED -->
  <div id="sec-conn">

    <!-- Room code (hôte seulement) -->
    <div id="room-display" style="display:none;" onclick="copyCode()">
      <div class="room-box">
        <div class="room-name" id="room-name-lbl">ROOM</div>
        <span class="room-code-big" id="room-code-big">------</span>
        <div class="room-copy-hint" id="copy-hint">Appuyez pour copier</div>
      </div>
    </div>

    <!-- Participants -->
    <div class="card" style="padding:12px;">
      <div class="lbl" id="p-lbl">Participants (1)</div>
      <div class="p-grid" id="p-grid"></div>
    </div>

    <!-- PTT + Channel mute -->
    <div class="card" style="padding:14px;display:flex;flex-direction:column;gap:12px;">
      <div class="ptt-section">
        <div class="ptt" id="ptt"
          ontouchstart="pttOn(event)" ontouchend="pttOff(event)" ontouchcancel="pttOff(event)"
          onmousedown="pttOn(event)" onmouseup="pttOff(event)" onmouseleave="pttOff(event)">
          <div class="ptt-ico">🎙️</div>
          <div class="ptt-lbl">Push to Talk</div>
        </div>
        <div class="ptt-hint" id="ptt-hint">Maintenez pour parler</div>
      </div>
      <button class="ch-btn" id="ch-btn" onclick="toggleChannelMute()">🔇 Couper le channel</button>
    </div>

    <button class="btn btn-gray" onclick="hangUp()">■ Raccrocher</button>
    <div class="log-card"><div class="log-hdr">Journal</div><div class="log-body" id="log-b"></div></div>
  </div>

</div>
</div>

<!-- Mute banner -->
<div id="mute-banner">
  <div class="mute-banner-txt">CHANNEL<br>COUPÉ</div>
  <div class="mute-banner-sub">AUDIO DÉSACTIVÉ</div>
  <button class="mute-banner-btn" onclick="toggleChannelMute()">Réactiver</button>
</div>

<!-- Chat panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-tab" onclick="toggleChat()">
    <span class="chat-tab-lbl">💬 Messages</span>
    <span class="chat-unread" id="chat-unread">0</span>
    <span id="chat-arrow" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#5E6474;">▲</span>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-row">
    <input class="chat-inp" id="chat-inp" type="text" placeholder="Écrire…" maxlength="300"
      onkeydown="if(event.key==='Enter')sendChat()" onfocus="openChat()">
    <button class="chat-send" onclick="sendChat()">➤</button>
  </div>
</div>

<script>
var TURN_URL='https://intercom-turn.nicolas7lejeune.workers.dev/';

// ── State ──────────────────────────────────────────────────────────────
var peer=null, myId='', myName='', isHost=false, roomCode='';
var pttActive=false, channelMuted=false, chatOpen=false, unread=0;
var localStream=null, audioCtx=null, peerCfg=null;
// peers: id → { name, conn, call, audio, muted, speaking }
var peers={};
var selfMuted=false; // muted par l'hôte

// ── Log ────────────────────────────────────────────────────────────────
function log(msg,type){
  var inConn=document.getElementById('sec-conn').style.display!=='none';
  var el=document.getElementById(inConn?'log-b':'log-a');if(!el)return;
  var t=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var d=document.createElement('div');d.className='le'+(type?' '+type:'');
  d.innerHTML='<span class="lt">'+t+'</span><span>'+esc(msg)+'</span>';
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function setStatus(txt,st){
  document.getElementById('hdr-dot').className='hdr-dot'+(st?' '+st:'');
  document.getElementById('hdr-st').textContent=txt;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function beep(f,d,v){try{var c=getACtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(v||.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function bipJoin(){beep(660,.1,.2);setTimeout(function(){beep(880,.12,.25);},120);}
function bipLeave(){beep(880,.1,.15);setTimeout(function(){beep(560,.12,.15);},120);}
function getACtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function genCode(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',r='';for(var i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}

// ── TURN ───────────────────────────────────────────────────────────────
async function getCfg(){
  if(peerCfg)return peerCfg;
  try{
    var r=await fetch(TURN_URL,{signal:AbortSignal.timeout(6000)});
    var d=await r.json();
    var raw=d.iceServers,ice=[];
    if(raw){
      var arr=Array.isArray(raw)?raw:[raw];
      arr.forEach(function(s){
        var urls=s.urls;
        if(typeof urls==='string')urls=urls.split(',').map(function(u){return u.trim();});
        if(!Array.isArray(urls))urls=[urls];
        var e={urls:urls};
        if(s.username)e.username=s.username;
        if(s.credential)e.credential=s.credential;
        ice.push(e);
      });
    }
    if(ice.length){log('TURN OK','ok');peerCfg={host:'0.peerjs.com',port:443,secure:true,config:{iceTransportPolicy:'all',iceServers:ice}};return peerCfg;}
  }catch(e){log('TURN fallback','err');}
  peerCfg={host:'0.peerjs.com',port:443,secure:true,config:{iceServers:[{urls:['stun:stun.l.google.com:19302']}]}};
  return peerCfg;
}

// ── Init Peer ──────────────────────────────────────────────────────────
async function initPeer(id){
  setStatus('CONNEXION…','wait');
  var cfg=await getCfg();
  peer=new Peer(id,cfg);
  peer.on('open',function(pid){myId=pid;log('Connecté: '+pid,'ok');setStatus('EN LIGNE','online');});
  peer.on('connection',function(c){onDataConn(c);});
  peer.on('call',function(c){
    log('Appel de '+c.peer);
    getMic(function(s){c.answer(s);onCall(c,c.peer);});
  });
  peer.on('error',function(e){log('Erreur: '+e.type,'err');setStatus('ERREUR','');});
}

// ── Create / Join ──────────────────────────────────────────────────────
window.createRoom=async function(){
  myName=(document.getElementById('my-name').value.trim()||'STUDIO').toUpperCase();
  isHost=true;
  roomCode=genCode();
  await initPeer('rm-'+roomCode);
  // Afficher le code en gros
  document.getElementById('room-display').style.display='block';
  document.getElementById('room-code-big').textContent=roomCode;
  document.getElementById('room-name-lbl').textContent='CODE DE LA ROOM';
  addSelf();showConnected();
  getMic(function(){log('Micro prêt','ok');});
  log('Room créée: '+roomCode,'ok');
};

window.joinRoom=async function(){
  var code=document.getElementById('room-inp').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(code.length<4){log('Code invalide','err');return;}
  myName=(document.getElementById('my-name').value.trim()||'RÉGIE').toUpperCase();
  isHost=false;roomCode=code;
  await initPeer('u-'+Date.now());
  peer.on('open',function(){
    log('Connexion à '+code+'…');
    var c=peer.connect('rm-'+code,{reliable:true,metadata:{name:myName}});
    onDataConn(c);
  });
};

// ── Data connection ────────────────────────────────────────────────────
function onDataConn(c){
  c.on('open',function(){
    log('Canal ouvert: '+c.peer,'ok');
    c.send({t:'hello',name:myName,id:myId});
    if(!isHost){
      getMic(function(s){
        var cl=peer.call('rm-'+roomCode,s,{metadata:{name:myName}});
        onCall(cl,'rm-'+roomCode);
      });
      addSelf();showConnected();
    }
  });
  c.on('data',function(d){
    if(d.t==='hello'){
      if(!peers[d.id])peers[d.id]={name:d.name,conn:c,call:null,audio:null,muted:false,speaking:false};
      else{peers[d.id].conn=c;peers[d.id].name=d.name;}
      log(d.name+' rejoint','ok');bipJoin();renderPeers();
      // Hôte : envoyer la liste à tout le monde
      if(isHost){
        var list=Object.entries(peers).map(function(e){return{id:e[0],name:e[1].name};});
        list.push({id:myId,name:myName,isHost:true});
        c.send({t:'peerlist',peers:list});
        // Informer les autres
        broadcast({t:'joined',id:d.id,name:d.name},d.id);
      }
    }
    if(d.t==='peerlist'){
      // Afficher tous les participants
      d.peers.forEach(function(p){
        if(p.id!==myId&&!peers[p.id])
          peers[p.id]={name:p.name,conn:null,call:null,audio:null,muted:false,speaking:false,isHost:!!p.isHost};
      });
      renderPeers();
    }
    if(d.t==='joined'){
      if(d.id!==myId&&!peers[d.id])peers[d.id]={name:d.name,conn:null,call:null,audio:null,muted:false,speaking:false};
      renderPeers();log(d.name+' a rejoint','ok');bipJoin();
    }
    if(d.t==='left'){removePeer(d.id);bipLeave();}
    if(d.t==='ptt_on'){if(peers[d.id]){peers[d.id].speaking=true;renderPeers();}}
    if(d.t==='ptt_off'){if(peers[d.id]){peers[d.id].speaking=false;renderPeers();}}
    if(d.t==='mute'&&d.target===myId){applyForceMute(d.muted);}
    if(d.t==='peer_muted'){if(peers[d.id]){peers[d.id].muted=d.muted;renderPeers();}}
    if(d.t==='chat'){addChatMsg(d.text,d.name,false);}
  });
  c.on('close',function(){
    Object.entries(peers).forEach(function(e){if(e[1].conn===c){log(e[1].name+' déconnecté','err');removePeer(e[0]);bipLeave();}});
  });
  c.on('error',function(e){log('Data err: '+e,'err');});
}

// ── Audio call ─────────────────────────────────────────────────────────
function onCall(c,pid){
  if(peers[pid])peers[pid].call=c;
  c.on('stream',function(remote){
    log('Audio reçu de '+pid,'ok');
    if(peers[pid])peers[pid].audio && peers[pid].audio.remove();
    var a=new Audio();a.srcObject=remote;a.autoplay=true;
    document.body.appendChild(a);
    a.play().catch(function(){['click','touchstart'].forEach(function(ev){document.addEventListener(ev,function u(){a.play();document.removeEventListener(ev,u);},{once:true});});});
    if(peers[pid])peers[pid].audio=a;
  });
  c.on('error',function(e){log('Call err: '+e,'err');});
}

// ── Mic ────────────────────────────────────────────────────────────────
function getMic(cb){
  if(localStream){cb(localStream);return;}
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true},video:false})
    .then(function(s){localStream=s;muteLocal(true);cb(s);})
    .catch(function(e){log('Micro refusé: '+e.message,'err');});
}
function muteLocal(m){if(localStream)localStream.getAudioTracks().forEach(function(t){t.enabled=!m;});}
function applyForceMute(m){
  selfMuted=m;
  if(m&&pttActive)pttOff();
  document.getElementById('ptt').className='ptt'+(m?' blocked':'');
  document.getElementById('ptt-hint').textContent=m?'Coupé par l\'hôte':'Maintenez pour parler';
  log(m?'Vous avez été coupé par l\'hôte':'Réactivé par l\'hôte',m?'err':'ok');
}

// ── PTT ────────────────────────────────────────────────────────────────
window.pttOn=function(e){
  e.preventDefault();
  if(selfMuted||channelMuted||pttActive)return;
  var p=document.getElementById('ptt');if(p.classList.contains('blocked'))return;
  pttActive=true;muteLocal(false);
  p.classList.add('on');
  document.getElementById('ptt-hint').textContent='En diffusion…';
  document.getElementById('ptt-hint').style.color='#27AE60';
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  broadcast({t:'ptt_on',id:myId});
};
window.pttOff=function(e){
  if(!pttActive)return;pttActive=false;muteLocal(true);
  var p=document.getElementById('ptt');if(p)p.classList.remove('on');
  document.getElementById('ptt-hint').textContent='Maintenez pour parler';
  document.getElementById('ptt-hint').style.color='';
  broadcast({t:'ptt_off',id:myId});
};

// ── Channel mute ───────────────────────────────────────────────────────
window.toggleChannelMute=function(){
  channelMuted=!channelMuted;
  Object.values(peers).forEach(function(p){if(p.audio)p.audio.muted=channelMuted;});
  if(channelMuted&&pttActive)pttOff();
  document.getElementById('ch-btn').className='ch-btn'+(channelMuted?' muted':'');
  document.getElementById('ch-btn').textContent=channelMuted?'🔊 Réactiver le channel':'🔇 Couper le channel';
  document.getElementById('mute-banner').className=channelMuted?'show':'';
};

// ── Host mute ──────────────────────────────────────────────────────────
window.hostMute=function(pid){
  if(!isHost)return;
  var p=peers[pid];if(!p)return;
  p.muted=!p.muted;
  if(p.conn&&p.conn.open)p.conn.send({t:'mute',target:pid,muted:p.muted});
  broadcast({t:'peer_muted',id:pid,muted:p.muted});
  renderPeers();
};

// ── Broadcast ──────────────────────────────────────────────────────────
function broadcast(msg,excludeId){
  Object.entries(peers).forEach(function(e){
    if(excludeId&&e[0]===excludeId)return;
    if(e[1].conn&&e[1].conn.open)e[1].conn.send(msg);
  });
}

// ── Participants UI ────────────────────────────────────────────────────
function addSelf(){peers[myId]={name:myName,conn:null,call:null,audio:null,muted:false,speaking:false,isHost:isHost,self:true};}
function removePeer(id){
  var p=peers[id];if(!p)return;
  if(p.audio){try{p.audio.pause();p.audio.remove();}catch(e){}}
  if(p.call){try{p.call.close();}catch(e){}}
  delete peers[id];renderPeers();
}
function renderPeers(){
  var grid=document.getElementById('p-grid');if(!grid)return;
  var list=Object.entries(peers);
  document.getElementById('p-lbl').textContent='Participants ('+list.length+')';
  grid.innerHTML=list.map(function(e){
    var id=e[0],p=e[1];
    var isSelf=p.self||id===myId;
    var avCls='p-avatar '+(isSelf?'self':'peer')+(p.speaking?' speaking':'');
    var nmCls='p-name'+(isSelf?' self':'');
    var tags='';
    if(p.isHost)tags+='<span class="tag tag-host">HÔTE</span>';
    if(p.muted)tags+='<span class="tag tag-muted">MUTÉ</span>';
    var muteBtn='';
    if(isHost&&!isSelf)muteBtn='<button class="mute-btn'+(p.muted?' on':'')+'" onclick="hostMute(\''+id+'\')">'+( p.muted?'RÉACT.':'MUTE')+'</button>';
    return '<div class="p-item'+(p.speaking?' speaking':'')+'">'
      +'<div class="'+avCls+'">'+esc(p.name.charAt(0))+'</div>'
      +'<div class="p-info">'
        +'<div class="'+nmCls+'">'+esc(p.name)+(isSelf?' <span style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:#42465A;">(vous)</span>':'')+'</div>'
        +(tags?'<div class="p-tags">'+tags+'</div>':'')
      +'</div>'
      +muteBtn
    +'</div>';
  }).join('');
}

// ── Connected UI ───────────────────────────────────────────────────────
function showConnected(){
  document.getElementById('sec-setup').style.display='none';
  document.getElementById('sec-conn').style.display='flex';
  document.getElementById('chat-panel').style.display='flex';
  setStatus('CONNECTÉ','online');
  renderPeers();
}

// ── Copy code ──────────────────────────────────────────────────────────
window.copyCode=function(){
  navigator.clipboard.writeText(roomCode).then(function(){
    var h=document.getElementById('copy-hint');
    if(h){h.textContent='✓ Copié !';h.classList.add('copied-flash');setTimeout(function(){h.textContent='Appuyez pour copier';h.classList.remove('copied-flash');},2000);}
  });
};

// ── Chat ───────────────────────────────────────────────────────────────
window.toggleChat=function(){
  chatOpen=!chatOpen;
  var m=document.getElementById('chat-msgs');
  m.className='chat-msgs'+(chatOpen?' open':'');
  document.getElementById('chat-arrow').textContent=chatOpen?'▼':'▲';
  if(chatOpen){unread=0;var b=document.getElementById('chat-unread');if(b)b.style.display='none';setTimeout(function(){m.scrollTop=m.scrollHeight;},250);}
};
window.openChat=function(){if(!chatOpen)toggleChat();};
window.sendChat=function(){
  var inp=document.getElementById('chat-inp');if(!inp)return;
  var txt=inp.value.trim();if(!txt)return;
  broadcast({t:'chat',text:txt,name:myName});
  addChatMsg(txt,myName,true);
  inp.value='';
};
function addChatMsg(text,from,isMe){
  var box=document.getElementById('chat-msgs');if(!box)return;
  var t=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  var div=document.createElement('div');div.className='chat-msg '+(isMe?'me':'them');
  div.innerHTML='<div class="bubble">'+esc(text)+'</div><div class="chat-meta">'+esc(from)+' · '+t+'</div>';
  box.appendChild(div);box.scrollTop=box.scrollHeight;
  if(!isMe){beep(1200,.08,.1);if(!chatOpen){unread++;var b=document.getElementById('chat-unread');if(b){b.textContent=unread;b.style.display='inline';}}}
}

// ── Hang up ────────────────────────────────────────────────────────────
window.hangUp=function(){
  pttOff();
  broadcast({t:'left',id:myId,name:myName});
  Object.values(peers).forEach(function(p){
    if(p.audio){try{p.audio.pause();p.audio.remove();}catch(e){}}
    if(p.call){try{p.call.close();}catch(e){}}
    if(p.conn){try{p.conn.close();}catch(e){}}
  });
  peers={};
  if(localStream){localStream.getTracks().forEach(function(t){t.stop();});localStream=null;}
  if(peer){try{peer.destroy();}catch(e){}peer=null;}
  audioCtx=null;peerCfg=null;channelMuted=false;pttActive=false;selfMuted=false;chatOpen=false;unread=0;
  document.getElementById('sec-setup').style.display='flex';
  document.getElementById('sec-conn').style.display='none';
  document.getElementById('chat-panel').style.display='none';
  document.getElementById('chat-msgs').innerHTML='';
  document.getElementById('room-display').style.display='none';
  document.getElementById('room-inp').value='';
  document.getElementById('mute-banner').className='';
  setStatus('HORS LIGNE','');log('Déconnecté');
};

log('Prêt');
</script>
